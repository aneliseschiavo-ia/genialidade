name: design-squad
version: 1.0.0
description: Design System Squad for Genialidade - Anelise Methodology MVP. Responsible for color palette, typography, component library, layout system, and visual design standards.
author: José Amorim
license: MIT
slashPrefix: design

aios:
  minVersion: "2.1.0"
  type: squad

components:
  tasks:
    - jose-amorim-design-lead-task.md
  agents:
    - jose-amorim-lead.md
  workflows: []
  checklists: []
  templates: []
  tools: []
  scripts: []

config:
  extends: extend
  coding-standards: ../../docs/framework/CODING-STANDARDS.md
  tech-stack: ../../docs/framework/TECH-STACK.md
  source-tree: ../../docs/framework/SOURCE-TREE.md

dependencies:
  node: []
  python: []
  squads: []

tags:
  - design
  - ui-ux
  - visual-system
  - custom

lead:
  agent: jose_amorim
  profile: consulting
  contact: design-squad@genialidade.local

focus_areas:
  - Color Palette (Brand, UI, Accessibility)
  - Typography System (Font Selection, Scales, Hierarchy)
